<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ねだんメモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root {
    --red: #E8192C;
    --red-light: #FF4A5A;
    --cream: #FFF8F0;
    --warm-white: #FFFCF8;
    --ink: #1A1A1A;
    --gray: #888;
    --border: #E8DDD0;
    --yellow: #FFD700;
    --green: #2ECC71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--red);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(232,25,44,0.3);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 480px;
    margin: 0 auto;
    gap: 8px;
  }
  .logo {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span {
    background: var(--yellow);
    color: var(--red);
    border-radius: 4px;
    padding: 1px 5px;
    margin-right: 4px;
    font-size: 13px;
    vertical-align: middle;
    font-weight: 900;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-btn {
    background: #fff;
    color: var(--red);
    border: none;
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .user-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }

  /* ===== LOGIN OVERLAY ===== */
  .login-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 32px;
  }
  .login-overlay.open { display: flex; }
  .login-logo {
    font-size: 48px;
    font-weight: 900;
    color: var(--red);
    margin-bottom: 8px;
  }
  .login-logo span {
    background: var(--yellow);
    color: var(--red);
    border-radius: 6px;
    padding: 2px 8px;
    margin-right: 6px;
    font-size: 20px;
    vertical-align: middle;
  }
  .login-subtitle {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .google-btn {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .google-btn:hover { border-color: var(--red); }
  .google-btn img { width: 22px; height: 22px; }
  .login-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--gray);
    line-height: 1.6;
  }

  /* ===== LOADING ===== */
  .loading-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 290;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .loading-screen.open { display: flex; }
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { font-size: 14px; color: var(--gray); }

  /* ===== SEARCH ===== */
  .search-bar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .search-bar-inner {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 9px 16px 9px 40px;
    font-size: 15px;
    font-family: inherit;
    background: var(--cream);
    outline: none;
    color: var(--ink);
  }
  .search-bar input:focus { border-color: var(--red); }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray);
    font-size: 17px;
  }

  /* ===== TABS ===== */
  .tabs {
    background: #fff;
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
  }
  .tabs-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
  }
  .tab {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--gray);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-family: inherit;
  }
  .tab.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }

  /* ===== MAIN ===== */
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 16px 80px;
  }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.6; }
  .empty strong { color: var(--ink); }

  /* ===== PRODUCT GROUP ===== */
  .product-group {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ===== ACCORDION HEADER ===== */
  .product-header {
    padding: 11px 14px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .product-header:active { background: #FFF0EE; }
  .product-group.open .product-header {
    border-bottom: 1px solid var(--border);
  }
  .header-left {
    flex: 1;
    min-width: 0;
  }
  .product-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    word-break: break-all;
    margin-bottom: 4px;
  }
  .product-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .product-category {
    font-size: 11px;
    background: #F0F0F0;
    border-radius: 10px;
    padding: 2px 8px;
    color: var(--gray);
    white-space: nowrap;
    display: inline-block;
  }
  .best-price {
    font-size: 13px;
    font-weight: 900;
    color: var(--red);
    white-space: nowrap;
  }
  .store-count-badge {
    font-size: 11px;
    color: var(--gray);
    background: #F0F0F0;
    border-radius: 10px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .header-right {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .chevron {
    font-size: 11px;
    color: var(--gray);
    transition: transform 0.2s ease;
    display: inline-block;
  }
  .product-group.open .chevron {
    transform: rotate(180deg);
  }

  /* ===== PRICE ROWS (accordion body) ===== */
  .price-rows {
    display: none;
    padding: 6px 0 4px;
  }
  .product-group.open .price-rows {
    display: block;
  }

  .price-row {
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .price-row:not(:last-child) {
    border-bottom: 1px solid #F5F0EB;
  }
  .price-rank {
    font-size: 10px;
    font-weight: 900;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .price-rank.rank-1 { color: var(--red); }
  .price-rank.rank-2 { color: #FF8C00; }
  .price-rank.rank-3 { color: var(--gray); }

  .price-bar-wrap {
    flex: 1;
    min-width: 0;
  }
  .brand-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .store-date-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .store-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .price-date {
    font-size: 11px;
    color: var(--gray);
    white-space: nowrap;
  }
  .price-bar-bg {
    background: #F5F0EB;
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
  }
  .price-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--red), var(--red-light));
    transition: width 0.4s ease;
  }
  .price-bar-fill.sale {
    background: linear-gradient(90deg, #F90, #FFD700);
  }

  .price-amount {
    font-size: 17px;
    font-weight: 900;
    color: var(--ink);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 60px;
    text-align: right;
  }
  .price-amount.sale-price { color: var(--red); }
  .sale-badge {
    font-size: 10px;
    background: var(--red);
    color: #fff;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 4px;
    font-weight: 700;
    vertical-align: middle;
  }

  .price-row-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 2px;
    line-height: 1;
    opacity: 0.5;
  }
  .icon-btn:hover { opacity: 1; }

  /* ===== MODAL ===== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: slideUp 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 18px;
    text-align: center;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray);
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }
  .field input, .field select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--red); }
  .field-sub-input { margin-top: 8px; }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .sale-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  .sale-toggle input[type=checkbox] {
    width: 20px;
    height: 20px;
    accent-color: var(--red);
    cursor: pointer;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1;
    background: #F0F0F0;
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save {
    flex: 2;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ===== SORT/FILTER ===== */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .toolbar::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    color: var(--gray);
  }
  .filter-chip.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .result-count {
    font-size: 12px;
    color: var(--gray);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ===== SIGN OUT ===== */
  .signout-area { text-align: center; padding: 40px 20px 20px; }
  .signout-link {
    font-size: 12px;
    color: var(--gray);
    text-decoration: underline;
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
  }
</style>
</head>

<!-- ローディング画面 -->
<div class="loading-screen open" id="loadingScreen">
  <div class="loading-spinner"></div>
  <p>読み込み中...</p>
</div>

<!-- ログイン画面 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-logo"><span>¥</span>ねだんメモ</div>
  <p class="login-subtitle">スーパーの値段を記録・比較する<br>あなただけのメモ帳</p>
  <button class="google-btn" onclick="signInWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">

  </button>
  <p class="login-note">Googleアカウントでログインすると<br>どのデバイスからでもデータにアクセスできます</p>

<header>
  <div class="header-inner">
    <div class="logo"><span>¥</span>ねだんメモ</div>
    <div class="header-right">
      <button class="add-btn" onclick="openModal()">＋ 追加</button>
      <button class="user-btn" id="userBtn" onclick="signOut()" style="display:none"></button>

<div class="search-bar">

</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" onclick="setTab('all',this)">すべて</button>
    <button class="tab" onclick="setTab('sale',this)">セール中</button>
    <button class="tab" onclick="setTab('recent',this)">最近追加</button>
  </div>
</div>

<main>
  <div class="toolbar">
    <span class="result-count" id="resultCount"></span>
    <button class="filter-chip active" onclick="setSort('name',this)">商品順</button>
    <button class="filter-chip" onclick="setSort('cheapest',this)">最安値順</button>
    <button class="filter-chip" onclick="setSort('recent',this)">更新順</button>
  </div>
  <div id="listArea"></div>
  <div class="signout-area">
    <button class="signout-link" id="signoutLink" onclick="signOut()" style="display:none">ログアウト</button>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">価格を追加</div>

    <div class="field-row">
      <div class="field">
        <label>カテゴリ</label>
        <select id="fCategory" onchange="updateProductOptions()">
          <option value="">なし</option>
          <option value="朝食">朝食</option>
          <option value="調味料">調味料</option>
          <option value="キッチン">キッチン</option>
          <option value="洗面所">洗面所</option>
          <option value="トイレ">トイレ</option>
          <option value="リビング">リビング</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>お店</label>
        <input type="text" id="fStore" placeholder="例）マックスバリュ" autocomplete="off">

    <div class="field">
      <label>商品名</label>
      <select id="fProduct" onchange="onProductChange()">

      <input type="text" id="fProductCustom" class="field-sub-input"
             placeholder="商品名を入力" style="display:none" autocomplete="off">

    <div class="field">
      <label>ブランド（任意）</label>
      <input type="text" id="fBrand" placeholder="例）シャウエッセン、トップバリュ">

    <div class="field-row">
      <div class="field">
        <label>値段（円）</label>
        <input type="number" id="fPrice" placeholder="198" inputmode="numeric">

        <label>日付</label>
        <input type="date" id="fDate">
      </div>

    <label class="sale-toggle">

    <div class="field">
      <label>メモ（任意）</label>
      <input type="text" id="fNote" placeholder="例）会員価格、クーポン使用">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="saveBtn" onclick="saveEntry()">保存する</button>
    </div>
  </div>
</div>

<script>
// ===== 品名マスター =====
const PRODUCTS = {
  '朝食':  ['卵','ウインナー','食パン','マーガリン','ジャム','スープ','麦茶','米','ベーコン','ハム','冷凍ブロッコリー','冷凍ホウレンソウ','増えるわかめ','キャベツ','肉団子'],
  '調味料': ['醤油','サラダ油','みりん','酢','かつおぶし','マヨネーズ','ケチャップ','塩コショウ','白だし','料理酒','おにぎり用ふりかけ','鶏がらスープ','しょうが','片栗粉','黒コショウ','コンソメ'],
  'キッチン': ['食器用洗剤','サランラップ大','排水口水切りネット','キッチンブリーチ','使い捨て手袋'],
  '洗面所': ['ハンドソープ','歯磨き粉','洗濯洗剤','ボディーソープ','シャンプー'],
  'トイレ':  ['トイレットペーパー','掃除洗剤','トイレシート'],
  'リビング': ['ボックスティッシュ','除菌スプレー','フローリング用ウェットペーパー'],
};

// ===== STATE =====
let data = [];
let editingId = null;
let currentTab = 'all';
let currentSort = 'name';
let currentUser = null;
let entriesRef = null;
let unsubscribeSnapshot = null;

// ===== AUTH =====
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    alert('ログインに失敗しました: ' + err.message);
  });
}
function signOut() {
  if (!confirm('ログアウトしますか？')) return;
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  document.getElementById('loadingScreen').classList.remove('open');
  if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }

  if (user) {
    currentUser = user;
    document.getElementById('loginOverlay').classList.remove('open');
    const name = user.displayName ? user.displayName.split(' ')[0] : 'ユーザー';
    const btn = document.getElementById('userBtn');
    btn.textContent = name + ' ▾';
    btn.style.display = '';
    document.getElementById('signoutLink').style.display = '';
    entriesRef = db.collection('users').doc(user.uid).collection('entries');
    unsubscribeSnapshot = entriesRef.onSnapshot(snapshot => {
      data = [];
      snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
      renderAll();
    }, err => console.error('Firestore error:', err));
  } else {
    currentUser = null; entriesRef = null; data = [];
    document.getElementById('loginOverlay').classList.add('open');
    document.getElementById('userBtn').style.display = 'none';
    document.getElementById('signoutLink').style.display = 'none';
    renderAll();
  }
});

// ===== 品名ドロップダウン =====
function updateProductOptions() {
  const cat = document.getElementById('fCategory').value;
  const sel = document.getElementById('fProduct');
  const custom = document.getElementById('fProductCustom');
  const list = PRODUCTS[cat] || [];

  if (list.length > 0) {
    sel.innerHTML = '<option value="">選択してください</option>' +
      list.map(p => `<option value="${p}">${p}</option>`).join('') +
      '<option value="__custom__">その他（直接入力）</option>';
    sel.style.display = '';
    custom.style.display = 'none';
    custom.value = '';
  } else {
    sel.innerHTML = '';
    sel.style.display = 'none';
    custom.style.display = '';
  }
}

function onProductChange() {
  const sel = document.getElementById('fProduct');
  const custom = document.getElementById('fProductCustom');
  if (sel.value === '__custom__') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
}

// ===== MODAL =====
function openModal(entry) {
  if (!currentUser) return;
  editingId = entry ? entry.id : null;
  document.getElementById('modalTitle').textContent = entry ? '価格を編集' : '価格を追加';

  document.getElementById('fCategory').value = entry ? (entry.category || '') : '';
  updateProductOptions();

  const productName = entry ? (entry.product || '') : '';
  const sel = document.getElementById('fProduct');
  const custom = document.getElementById('fProductCustom');
  const inList = productName && Array.from(sel.options).some(o => o.value === productName);

  if (!productName) {
    if (sel.style.display !== 'none') sel.value = '';
  } else if (inList) {
    sel.value = productName;
    custom.style.display = 'none';
  } else {
    if (sel.style.display !== 'none') sel.value = '__custom__';
    custom.value = productName;
    custom.style.display = '';
  }

  document.getElementById('fBrand').value = entry ? (entry.brand || '') : '';
  document.getElementById('fStore').value = entry ? entry.store : '';
  document.getElementById('fPrice').value = entry ? entry.price : '';
  document.getElementById('fDate').value = entry ? entry.date : todayStr();
  document.getElementById('fSale').checked = entry ? !!entry.sale : false;
  document.getElementById('fNote').value = entry ? (entry.note || '') : '';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalIfBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

async function saveEntry() {
  if (!entriesRef) return;

  const sel = document.getElementById('fProduct');
  const custom = document.getElementById('fProductCustom');
  let product = '';
  if (sel.style.display === 'none') {
    product = custom.value.trim();
  } else if (sel.value === '__custom__') {
    product = custom.value.trim();
  } else {
    product = sel.value;
  }

  const brand = document.getElementById('fBrand').value.trim();
  const store = document.getElementById('fStore').value.trim();
  const price = parseInt(document.getElementById('fPrice').value);
  const date = document.getElementById('fDate').value;

  if (!product || !store || isNaN(price) || !date) {
    alert('商品名・お店・値段・日付は必須です');
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  const entryData = {
    product, brand,
    category: document.getElementById('fCategory').value,
    store, price, date,
    sale: document.getElementById('fSale').checked,
    note: document.getElementById('fNote').value.trim(),
    updated: Date.now()
  };

  try {
    if (editingId) {
      await entriesRef.doc(editingId).update(entryData);
    } else {
      await entriesRef.add(entryData);
    }
    closeModal();
  } catch (err) {
    alert('保存に失敗しました: ' + err.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する';
  }
}

async function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  if (!entriesRef) return;
  try {
    await entriesRef.doc(id).delete();
  } catch (err) {
    alert('削除に失敗しました: ' + err.message);
  }
}

// ===== TABS / SORT =====
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function setSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ===== ACCORDION =====
function toggleGroup(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// ===== RENDER =====
function renderAll() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = data.filter(e => {
    if (currentTab === 'sale') return e.sale;
    if (currentTab === 'recent') {
      const diff = (new Date() - new Date(e.date)) / (1000*60*60*24);
      return diff <= 14;
    }
    return true;
  });

  if (q) {
    filtered = filtered.filter(e =>
      e.product.toLowerCase().includes(q) ||
      e.store.toLowerCase().includes(q) ||
      (e.brand && e.brand.toLowerCase().includes(q)) ||
      (e.category && e.category.toLowerCase().includes(q))
    );
  }

  const groups = {};
  filtered.forEach(e => {
    if (!groups[e.product]) groups[e.product] = [];
    groups[e.product].push(e);
  });

  let groupKeys = Object.keys(groups);
  if (currentSort === 'cheapest') {
    groupKeys.sort((a,b) => Math.min(...groups[a].map(e=>e.price)) - Math.min(...groups[b].map(e=>e.price)));
  } else if (currentSort === 'recent') {
    groupKeys.sort((a,b) => Math.max(...groups[b].map(e=>e.updated||0)) - Math.max(...groups[a].map(e=>e.updated||0)));
  } else {
    groupKeys.sort((a,b) => a.localeCompare(b, 'ja'));
  }

  document.getElementById('resultCount').textContent = groupKeys.length ? `${groupKeys.length}商品` : '';

  const area = document.getElementById('listArea');
  if (!currentUser) { area.innerHTML = ''; return; }
  if (!groupKeys.length) {
    area.innerHTML = `<div class="empty">
      <div class="empty-icon">🛒</div>
      <p>${data.length === 0 ? '<strong>＋ 追加</strong>ボタンから<br>最初の価格を登録しよう！' : '見つかりませんでした'}</p>
    </div>`;
    return;
  }

  area.innerHTML = groupKeys.map(product => {
    const entries = groups[product].sort((a,b) => a.price - b.price);
    const minPrice = entries[0].price;
    const maxPrice = entries[entries.length-1].price;
    const category = entries[0].category || '';
    const storeCount = entries.length;
    const groupId = 'grp_' + btoa(encodeURIComponent(product)).replace(/[^a-zA-Z0-9]/g,'').slice(0,16) + '_' + Math.random().toString(36).slice(2,6);

    const priceRows = entries.map((e, i) => {
      const barPct = maxPrice === minPrice ? 100 : Math.round(((e.price - minPrice) / (maxPrice - minPrice)) * 80 + 20);
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : 'rank-3';
      const rankLabel = i === 0 ? '最安' : `${i+1}位`;
      const dateLabel = e.date ? e.date.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3') : '';
      return `<div class="price-row">
        <div class="price-rank ${rankClass}">${rankLabel}</div>
        <div class="price-bar-wrap">
          ${e.brand ? `<div class="brand-name">${esc(e.brand)}</div>` : ''}
          <div class="store-date-row">
            <span class="store-name">${esc(e.store)}</span>
            <span class="price-date">${dateLabel}${e.note ? ' · '+esc(e.note) : ''}</span>
          </div>
          <div class="price-bar-bg">
            <div class="price-bar-fill${e.sale?' sale':''}" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="price-amount${e.sale?' sale-price':''}">
          ¥${e.price.toLocaleString()}${e.sale?'<span class="sale-badge">特売</span>':''}
        </div>
        <div class="price-row-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openModal(${JSON.stringify(e).replace(/"/g,'&quot;')})" title="編集">✏️</button>
          <button class="icon-btn" onclick="event.stopPropagation();deleteEntry('${e.id}')" title="削除">🗑️</button>
        </div>
      </div>`;
    }).join('');

    return `<div class="product-group" id="${groupId}">
      <div class="product-header" onclick="toggleGroup('${groupId}')">
        <div class="header-left">
          <div class="product-name">${esc(product)}</div>
          <div class="product-meta">
            <span class="best-price">¥${minPrice.toLocaleString()}</span>
            ${category ? `<span class="product-category">${esc(category)}</span>` : ''}
            ${storeCount > 1 ? `<span class="store-count-badge">${storeCount}店舗</span>` : ''}
          </div>
        </div>
        <div class="header-right">
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="price-rows">${priceRows}</div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
